name: S01 Issue Title Single Run Under Test

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: read

defaults:
  run:
    shell: bash

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Bad patch - still direct interpolation
        run: issue_title="${{ github.event.issue.title }}"; echo "VALUE::$issue_title"

      - name: Downstream reachability checkpoint
        if: always()
        run: echo "DOWNSTREAM_REACHED"

      - name: Check injection marker file
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/gha_validator_s01_marker" ]; then
            echo "EXECUTION_MARKER_PRESENT"
          else
            echo "EXECUTION_MARKER_ABSENT"
          fi
