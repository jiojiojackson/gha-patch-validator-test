name: GHA Validator Runtime I(V) s01-20260630-091125
'on':
  issues:
    types:
    - opened
permissions:
  contents: read
  issues: read
defaults:
  run:
    shell: bash
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - name: GHA Validator - source checkpoint
      env:
        GHA_VALIDATOR_SOURCE_VALUE: ${{ github.event.issue.title }}
      run: 'python3 - <<''PY''

        import os, hashlib

        v = os.environ.get(''GHA_VALIDATOR_SOURCE_VALUE'', '''')

        print(''GHA_VALIDATOR_SOURCE_SHA256='' + hashlib.sha256(v.encode(''utf-8'')).hexdigest())

        PY'
    - name: GHA Validator - target checkpoint
      run: echo "GHA_VALIDATOR_TARGET_REACHED"
    - name: Use issue title in release command
      run: title="${{ github.event.issue.title }}"; echo "Release title is $title"
    - name: GHA Validator - downstream checkpoint
      run: echo "GHA_VALIDATOR_DOWNSTREAM_REACHED"
    - name: GHA Validator - marker observer
      if: always()
      run: "if [ -f \"$RUNNER_TEMP/gha_validator_marker\" ]; then\n  echo \"GHA_VALIDATOR_EXECUTION_MARKER_PRESENT\"\
        \nelse\n  echo \"GHA_VALIDATOR_EXECUTION_MARKER_ABSENT\"\nfi"
    - name: Business downstream step
      run: echo "Business downstream step executed"
